<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Dragon Language · Изучение китайского</title>
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', 'Noto Sans SC', system-ui, sans-serif;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* ФОН С ФОТОГРАФИЕЙ КИТАЯ */
        .auth-wrapper {
            position: relative;
            min-height: 100vh;
            background: url('nighty-city.png') center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-wrapper::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 35, 0.55);
            backdrop-filter: blur(3px);
        }

        /* ------ АНИМИРОВАННЫЙ ФОН (драконы, искры) ------ */
        .falling-spark {
            position: fixed;
            font-size: 18px;
            opacity: 0.2;
            pointer-events: none;
            z-index: 0;
            animation: fallSpark 12s linear infinite;
        }
        @keyframes fallSpark {
            0% { transform: translateY(-20vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.2; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
        .floating-dragon {
            position: fixed;
            font-size: 70px;
            opacity: 0.06;
            pointer-events: none;
            z-index: 0;
            animation: floatDragon 28s infinite alternate;
        }
        @keyframes floatDragon {
            0% { transform: translateX(-40px) translateY(0px); }
            100% { transform: translateX(60px) translateY(-25px); }
        }

        /* ===== СТИЛЬ СЛАЙДЕРА ДЛЯ ВХОДА/РЕГИСТРАЦИИ ===== */
        .container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(20, 25, 55, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(64, 224, 208, 0.2);
            overflow: hidden;
            min-height: 520px;
            z-index: 2;
        }

        .form-container {
            position: absolute;
            top: 0;
            height: 100%;
            transition: all 0.5s ease-in-out;
        }

        .sign-in {
            left: 0;
            width: 50%;
            z-index: 2;
        }

        .container.active .sign-in {
            transform: translateX(100%);
        }

        .sign-up {
            left: 0;
            width: 50%;
            opacity: 0;
            z-index: 1;
        }

        .container.active .sign-up {
            transform: translateX(100%);
            opacity: 1;
            z-index: 5;
            animation: move 0.5s;
        }

        @keyframes move {
            0%, 49.99% { opacity: 0; z-index: 1; }
            50%, 100% { opacity: 1; z-index: 5; }
        }

        .toggle-container {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            overflow: hidden;
            transition: all 0.5s ease-in-out;
            border-radius: 80px 0 0 80px;
            z-index: 100;
        }

        .container.active .toggle-container {
            transform: translateX(-100%);
            border-radius: 0 80px 80px 0;
        }

        .toggle {
            background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 50%, #0b2a4a 100%);
            height: 100%;
            color: white;
            position: relative;
            left: -100%;
            width: 200%;
            transform: translateX(0);
            transition: all 0.5s ease-in-out;
        }

        .container.active .toggle {
            transform: translateX(50%);
        }

        .toggle-panel {
            position: absolute;
            width: 50%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 20px;
            text-align: center;
            top: 0;
            transform: translateX(0);
            transition: all 0.5s ease-in-out;
        }

        .toggle-left {
            transform: translateX(-200%);
        }

        .container.active .toggle-left {
            transform: translateX(0);
        }

        .toggle-right {
            right: 0;
            transform: translateX(0);
        }

        .container.active .toggle-right {
            transform: translateX(200%);
        }

        .toggle-panel h1 {
            font-size: 22px;
            margin-bottom: 12px;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .toggle-panel p {
            margin-bottom: 20px;
            opacity: 0.8;
            font-size: 12px;
        }

        .toggle-panel button {
            background: transparent;
            border: 1.5px solid rgba(64, 224, 208, 0.7);
            padding: 8px 24px;
            border-radius: 30px;
            color: #40e0d0;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }

        .toggle-panel button:hover {
            background: #40e0d0;
            color: #0a1628;
            border-color: #40e0d0;
        }

        form {
            background: rgba(15, 20, 45, 0.85);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 0 30px;
            height: 100%;
        }

        form h1 {
            color: #40e0d0;
            margin-bottom: 15px;
            font-size: 24px;
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .social-icons {
            margin: 12px 0;
            display: flex;
            gap: 12px;
        }

        .social-icons a {
            border: 1px solid rgba(64, 224, 208, 0.4);
            border-radius: 50%;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 34px;
            height: 34px;
            color: #40e0d0;
            text-decoration: none;
            transition: 0.3s;
            font-size: 16px;
        }

        .social-icons a:hover {
            background: #40e0d0;
            color: #0a1628;
        }

        form span {
            font-size: 11px;
            color: #8ba3c7;
            margin-bottom: 15px;
        }

        form input {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(64, 224, 208, 0.3);
            padding: 10px 16px;
            margin: 6px 0;
            width: 100%;
            border-radius: 30px;
            font-size: 13px;
            color: white;
            transition: 0.2s;
        }

        form input:focus {
            outline: none;
            border-color: #40e0d0;
            box-shadow: 0 0 0 2px rgba(64, 224, 208, 0.2);
        }

        form input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        form a {
            color: #40e0d0;
            text-decoration: none;
            font-size: 11px;
            margin: 12px 0;
        }

        form button {
            background: linear-gradient(135deg, #40e0d0, #2ba8a0);
            color: #0a1628;
            border: none;
            padding: 10px 32px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
        }

        form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(64, 224, 208, 0.3);
        }

        .test-creds {
            margin-top: 15px;
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
        }

        /* ===== ДОРОЖКА С КРУЖКАМИ ПОСЛЕ ВХОДА ===== */
        .main-app {
            display: none;
            min-height: 100vh;
            background: linear-gradient(145deg, #0a0f1f 0%, #0b1428 100%);
        }
        .main-app.visible {
            display: block;
        }

        .app-header {
            background: rgba(10, 15, 35, 0.92);
            backdrop-filter: blur(12px);
            padding: 10px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(64, 224, 208, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .logo-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-header img {
            height: 42px;
            width: auto;
        }
        .logo-header span {
            font-weight: 700;
            font-size: 16px;
            color: #e0e0e0;
            letter-spacing: 2px;
            font-family: 'Cormorant Garamond', serif;
        }
        .user-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .user-info-compact {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(64, 224, 208, 0.12);
            padding: 4px 12px 4px 6px;
            border-radius: 40px;
        }
        .profile-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            background: #1a2a4a;
            cursor: pointer;
            border: 1.5px solid #40e0d0;
        }
        .username-display {
            font-size: 13px;
            font-weight: 500;
            color: #d0d9f0;
        }
        .logout-btn {
            background: none;
            border: 1px solid rgba(64, 224, 208, 0.4);
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            color: #c0d0e8;
            font-size: 12px;
        }
        .logout-btn:hover {
            background: #40e0d0;
            color: #0a1628;
            border-color: #40e0d0;
        }

        /* ДОРОЖКА С ВОЛНИСТЫМИ ЛИНИЯМИ */
        .journey-container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 30px 20px;
            position: relative;
        }

        .wave-path {
            position: absolute;
            top: 70px;
            left: 0;
            width: 100%;
            height: 70px;
            pointer-events: none;
            z-index: 0;
        }

        .wave-svg {
            width: 100%;
            height: 100%;
        }

        .wave-path svg path {
            stroke: #40e0d0;
            stroke-width: 1.8;
            stroke-dasharray: 8, 6;
            fill: none;
            opacity: 0.5;
            animation: dash 25s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -800; }
        }

        .stones-track {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            position: relative;
            z-index: 2;
        }

        .stone-card {
            flex: 1;
            min-width: 130px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            animation: fadeInUp 0.5s ease backwards;
        }

        .stone-card:hover {
            transform: translateY(-8px);
        }

        .stone-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto 15px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #132240, #0d1c30);
            border-radius: 50%;
            box-shadow: 0 0 0 2.5px #40e0d0, 0 8px 20px rgba(0,0,0,0.3);
            transition: all 0.3s;
        }

        .stone-circle::before {
            content: '';
            position: absolute;
            top: -4px;
            left: -4px;
            right: -4px;
            bottom: -4px;
            border-radius: 50%;
            background: repeating-conic-gradient(
                from 0deg,
                #40e0d0 0deg 12deg,
                transparent 12deg 24deg
            );
            opacity: 0.5;
            animation: rotateWave 6s linear infinite;
        }

        @keyframes rotateWave {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .stone-circle h3 {
            color: #40e0d0;
            font-size: 32px;
            font-weight: 700;
            font-family: 'Cormorant Garamond', serif;
        }

        .stone-title {
            color: #d0d9f0;
            font-weight: 500;
            font-size: 15px;
            margin-bottom: 4px;
        }

        .stone-lesson-count {
            color: #40e0d0;
            font-size: 11px;
            font-weight: 400;
            opacity: 0.8;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* КАРТОЧКА УРОКА (расширена для теории и тестов) */
        .lesson-detail-card, .stories-section {
            margin-top: 50px;
            background: rgba(15, 25, 45, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 25px;
            border: 1px solid rgba(64, 224, 208, 0.25);
            animation: fadeIn 0.4s ease;
        }

        .lesson-header { margin-bottom: 25px; }
        .lesson-header h3 { color: #40e0d0; font-size: 24px; font-family: 'Cormorant Garamond', serif; }
        .lesson-header p { color: #b8c4dc; margin-top: 8px; }

        /* Теоретический блок */
        .theory-section {
            background: rgba(10, 20, 40, 0.5);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 25px;
        }
        .theory-section h4 {
            color: #40e0d0;
            font-size: 18px;
            margin-bottom: 15px;
            border-left: 3px solid #40e0d0;
            padding-left: 12px;
        }
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .vocab-item {
            background: rgba(64, 224, 208, 0.08);
            padding: 10px 12px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .vocab-chinese {
            font-size: 16px;
            font-weight: 500;
            color: #e0e8ff;
            font-family: 'Noto Sans SC', serif;
        }
        .vocab-pinyin {
            font-size: 12px;
            color: #80b0d0;
            font-style: italic;
        }
        .vocab-meaning {
            font-size: 12px;
            color: #a0b8d0;
        }
        .example-sentence {
            background: rgba(64, 224, 208, 0.05);
            padding: 10px 15px;
            border-radius: 16px;
            margin-bottom: 10px;
        }
        .example-chinese {
            font-size: 15px;
            color: #e0e8ff;
            font-family: 'Noto Sans SC', serif;
            margin-bottom: 5px;
        }
        .example-pinyin {
            font-size: 12px;
            color: #80b0d0;
            font-style: italic;
            margin-bottom: 5px;
        }
        .example-translation {
            font-size: 12px;
            color: #a0b8d0;
        }
        .play-theory-audio {
            background: none;
            border: 1px solid #40e0d0;
            padding: 4px 12px;
            border-radius: 20px;
            color: #40e0d0;
            cursor: pointer;
            font-size: 11px;
            transition: 0.2s;
            margin-left: 10px;
        }
        .play-theory-audio:hover {
            background: #40e0d0;
            color: #0a1628;
        }

        .quiz-question {
            background: rgba(10, 20, 40, 0.6);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .question-text { color: #e0e8ff; font-size: 18px; margin-bottom: 15px; font-weight: 500; }
        .options-list { display: flex; flex-direction: column; gap: 10px; }
        .option {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            background: rgba(64, 224, 208, 0.08); border-radius: 16px; cursor: pointer;
            transition: 0.2s; border: 1px solid transparent;
        }
        .option:hover { background: rgba(64, 224, 208, 0.15); border-color: rgba(64, 224, 208, 0.3); }
        .option.selected { background: rgba(64, 224, 208, 0.25); border-color: #40e0d0; }
        .option.correct { background: rgba(46, 204, 113, 0.2); border-color: #2ecc71; }
        .option.wrong { background: rgba(231, 76, 60, 0.2); border-color: #e74c3c; }
        .option-prefix { width: 28px; height: 28px; background: rgba(64,224,208,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #40e0d0; }
        .option-text { color: #c0d0e8; flex: 1; }

        .quiz-result { margin-top: 20px; padding: 15px; background: rgba(64,224,208,0.1); border-radius: 20px; text-align: center; }
        .check-answers-btn, .next-lesson-btn {
            background: #40e0d0; border: none; padding: 12px 28px; border-radius: 30px;
            color: #0a1628; font-weight: 600; cursor: pointer; transition: 0.3s; margin-right: 10px;
        }
        .check-answers-btn:hover, .next-lesson-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(64,224,208,0.3); }
        .action-btn { background: #2a3a5a; padding: 8px 20px; border-radius: 30px; border: none; color: white; cursor: pointer; }

        /* КИТАЙСКИЕ СКАЗКИ И ИСТОРИИ */
        .stories-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stories-header h2 {
            color: #40e0d0;
            font-size: 24px;
            font-family: 'Cormorant Garamond', serif;
        }

        .story-cards {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .story-card {
            background: rgba(10, 18, 35, 0.6);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(64, 224, 208, 0.2);
            transition: all 0.3s;
        }

        .story-card:hover {
            border-color: rgba(64, 224, 208, 0.5);
        }

        .story-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .story-title h3 {
            color: #40e0d0;
            font-size: 18px;
            font-family: 'Cormorant Garamond', serif;
        }

        .story-controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .play-audio-btn {
            background: none;
            border: 1px solid #40e0d0;
            padding: 6px 14px;
            border-radius: 25px;
            color: #40e0d0;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
        }

        .play-audio-btn:hover {
            background: #40e0d0;
            color: #0a1628;
        }

        .toggle-story-btn {
            background: none;
            border: none;
            color: #40e0d0;
            cursor: pointer;
            font-size: 20px;
        }

        .story-content {
            display: none;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid rgba(64, 224, 208, 0.2);
        }

        .story-content.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        .chinese-text {
            font-size: 18px;
            line-height: 1.8;
            color: #e0e8ff;
            font-family: 'Noto Sans SC', 'SimSun', serif;
            margin-bottom: 15px;
        }

        .pinyin-text {
            font-size: 14px;
            color: #80b0d0;
            font-style: italic;
            margin-bottom: 12px;
        }

        .russian-text {
            font-size: 14px;
            color: #b8c4dc;
            line-height: 1.6;
        }

        .test-reading {
            margin-top: 20px;
            background: rgba(64, 224, 208, 0.08);
            border-radius: 20px;
            padding: 15px;
        }

        .test-reading p {
            color: #a0b0d0;
            font-size: 13px;
            margin-bottom: 12px;
        }

        .test-reading-btn {
            background: none;
            border: 1px solid #40e0d0;
            padding: 5px 15px;
            border-radius: 20px;
            color: #40e0d0;
            cursor: pointer;
            font-size: 12px;
        }

        /* ТАБЫ */
        .content-tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(64, 224, 208, 0.2);
            padding-bottom: 10px;
        }

        .content-tab {
            padding: 8px 24px;
            background: none;
            border: none;
            color: #8ba3c7;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: 0.2s;
            border-radius: 20px;
        }

        .content-tab.active {
            color: #40e0d0;
            background: rgba(64, 224, 208, 0.12);
        }

        .content-tab-pane {
            display: none;
        }

        .content-tab-pane.active {
            display: block;
        }

        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-card {
            background: #0e1a2c;
            border-radius: 36px;
            padding: 28px;
            width: 400px;
            text-align: center;
            border: 1px solid #40e0d0;
        }
        .modal-card h3 { color: #40e0d0; margin-bottom: 15px; font-family: 'Cormorant Garamond', serif; }
        .modal-card input {
            width: 100%;
            padding: 10px 14px;
            margin: 8px 0;
            background: #1a2a4a;
            border: 1px solid #40e0d0;
            border-radius: 30px;
            color: white;
        }
        .modal-card button {
            background: #40e0d0;
            border: none;

        { id: 7, title: 'Лунный заяц', titleCn: '玉兔', fullText: '传说月亮上有一只玉兔，它每天都在月宫里捣药。这药能让人长生不老。', fullTextCn: 'Chuánshuō yuèliàng shàng yǒu yī zhǐ yù tù, tā měitiān dōu zài yuègōng lǐ dǎo yào.', fullStory: 'На луне живёт Нефритовый Заяц — верный спутник богини Чанъэ. Согласно легенде, он толчёт в ступе волшебное снадобье бессмертия. Каждую ночь его силуэт можно увидеть на полной луне.' },
        { id: 8, title: 'Почему у петуха красный гребешок', titleCn: '公鸡的红冠', fullText: '很久以前，玉皇大帝让动物们比赛谁先到天宫。公鸡起晚了，借了龙的角。', fullTextCn: 'Hěn jiǔ yǐqián, Yùhuáng Dàdì ràng dòngwùmen bǐsài shuí xiān dào tiāngōng.', fullStory: 'Давным-давно Нефритовый Император решил выбрать 12 животных для зодиака. Петух попросил у Дракона его красивые рога, но потом не вернул. Поэтому каждое утро петух кричит: «Дракон, отдай мои рога!»' },
        { id: 9, title: 'Шёлк — тайна Китая', titleCn: '丝绸的秘密', fullText: '传说黄帝的妻子嫘祖发现蚕吐的丝可以织成美丽的布料。她教人们养蚕、抽丝、织布。', fullTextCn: 'Chuánshuō Huángdì de qīzi Léi Zǔ fāxiàn cán tǔ de sī kěyǐ zhī chéng měilì de bùliào.', fullStory: 'Жена Жёлтого императора Лэйцзу заметила, как кокон шелкопряда разматывается в длинную нить. Она научила китайцев разводить шелкопрядов и ткать шёлк. Тысячи лет секрет шёлка хранился в Китае.' },
        { id: 10, title: 'Китайская стена — дракон-защитник', titleCn: '长城的传说', fullText: '传说秦始皇修建长城时，一条神龙帮助工人搬运巨石。龙的身体化作了万里长城。', fullTextCn: 'Chuánshuō Qín Shǐhuáng xiūjiàn Chángchéng shí, yī tiáo shén lóng bāngzhù gōngrén bānyùn jùshí.', fullStory: 'Легенда гласит, что при строительстве Великой стены императору Цинь Шихуану помогал священный дракон. Дракон своим телом указал путь стене, а затем его дух навсегда остался охранять границы Китая.' }
    ];

    let selectedLesson = null;
    let currentAnswers = {};
    let activeStoryAudio = null;

    function saveUsers() { localStorage.setItem('dragon_users', JSON.stringify(users)); }
    function saveProgress() { localStorage.setItem('dragon_progress', JSON.stringify(userProgress)); }

    function initDemo() {
        if(users.length === 0) {
            users.push({ id: 1, username: 'dragon', email: 'dragon@example.com', password: 'dragon123', avatar: '' });
            saveUsers();
        }
    }

    // Рендер камней (уроки HSK) с отображением пройденных
    function renderStones() {
        const track = document.getElementById('stonesTrack');
        if (!track) return;
        track.innerHTML = '';
        lessonsData.forEach((lesson, idx) => {
            const stone = document.createElement('div');
            stone.className = 'stone-card';
            stone.style.animationDelay = `${idx * 0.05}s`;
            stone.onclick = () => showLessonDetail(lesson);
            const completed = userProgress[`lesson_${lesson.id}`]?.completed;
            stone.innerHTML = `
                <div class="stone-circle" style="${completed ? 'box-shadow: 0 0 0 2.5px #2ecc71, 0 8px 20px rgba(0,0,0,0.3);' : ''}">
                    <h3>${lesson.level}</h3>
                </div>
                <div class="stone-title">${lesson.title} ${completed ? '✓' : ''}</div>
                <div class="stone-lesson-count">${lesson.duration}</div>
            `;
            track.appendChild(stone);
        });
    }

    // ПОЛНОСТЬЮ РАБОТАЮЩИЙ УРОК С ТЕОРИЕЙ И ТЕСТАМИ
    function showLessonDetail(lesson) {
        selectedLesson = lesson;
        currentAnswers = {};
        
        const theory = theoryData[lesson.id] || theoryData[1];
        
        let theoryHtml = `
            <div class="theory-section">
                <h4>📚 Грамматика уровня ${lesson.level}</h4>
                <p style="color:#b8c4dc; margin-bottom:15px;">${theory.grammar}</p>
                ${theory.commonPhrases && theory.commonPhrases.length ? `
                <h4 style="margin-top:15px;">📝 Основные фразы</h4>
                <div class="vocab-grid">
                    ${theory.commonPhrases.map(phrase => `
                        <div class="vocab-item">
                            <span class="vocab-chinese">${phrase.chinese}</span>
                            <span class="vocab-pinyin">${phrase.pinyin}</span>
                            <span class="vocab-meaning">${phrase.meaning}</span>
                            <button class="play-theory-audio" onclick="playTextAudio('${phrase.chinese}')">🔊</button>
                        </div>
                    `).join('')}
                </div>
                ` : ''}
                ${theory.examples && theory.examples.length ? `
                <h4 style="margin-top:15px;">📖 Примеры предложений</h4>
                ${theory.examples.map(ex => `
                    <div class="example-sentence">
                        <div class="example-chinese">${ex.chinese}</div>
                        <div class="example-pinyin">${ex.pinyin}</div>
                        <div class="example-translation">${ex.translation}</div>
                        <button class="play-theory-audio" onclick="playTextAudio('${ex.chinese}')">🔊 Озвучить</button>
                    </div>
                `).join('')}
                ` : ''}
            </div>
        `;
        
        let quizzesHtml = '';
        if (lesson.quizzes && lesson.quizzes.length) {
            lesson.quizzes.forEach((q, idx) => {
                quizzesHtml += `
                    <div class="quiz-question" data-qid="${idx}">
                        <div class="question-text">${idx+1}. ${q.question}</div>
                        <div class="options-list">
                            ${q.options.map((opt, optIdx) => `
                                <div class="option" data-q="${idx}" data-opt="${optIdx}" onclick="selectOption(${idx}, ${optIdx})">
                                    <div class="option-prefix">${String.fromCharCode(65+optIdx)}</div>
                                    <div class="option-text">${opt}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
        }
        
        const completed = userProgress[`lesson_${lesson.id}`]?.completed;
        const detailDiv = document.getElementById('lessonDetail');
        detailDiv.style.display = 'block';
        detailDiv.innerHTML = `
            <div class="lesson-header">
                <h3>🐉 ${lesson.level}: ${lesson.title} (${lesson.chinese})</h3>
                <p>${lesson.description}</p>
                <p style="color:#40e0d0;">📚 ${lesson.duration}</p>
                ${completed ? '<p style="color:#2ecc71;">✅ Урок пройден!</p>' : ''}
            </div>
            ${theoryHtml}
            ${quizzesHtml ? '<h4 style="margin:20px 0 15px;">📝 Проверьте свои знания</h4>' : ''}
            ${quizzesHtml || '<p style="color:#8ba3c7;">Материалы урока подготавливаются...</p>'}
            ${quizzesHtml ? `<div class="quiz-result" id="quizResult"></div>
            <div style="margin-top:20px;">
                <button class="check-answers-btn" onclick="checkAnswers()">Проверить ответы</button>
                ${!completed ? `<button class="next-lesson-btn" onclick="completeLesson()" id="completeLessonBtn" style="display:none;">✓ Завершить урок</button>` : ''}
            </div>` : ''}
            <button class="action-btn" onclick="document.getElementById('lessonDetail').style.display='none'">Скрыть урок</button>
        `;
        detailDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // Отображение Цифр и чисел
    function renderNumbers() {
        const container = document.getElementById('numbersCard');
        if (!container) return;
        container.innerHTML = `
            <div class="lesson-header">
                <h3>📊 Цифры и числа на китайском языке</h3>
                <p>Изучите китайские цифры, правила образования чисел и примеры использования.</p>
            </div>
            <div class="theory-section">
                <h4>🔢 Основные цифры</h4>
                <div class="vocab-grid">
                    ${numbersData.digits.map(d => `
                        <div class="vocab-item">
                            <span class="vocab-chinese">${d.num}: ${d.chinese}</span>
                            <span class="vocab-pinyin">${d.pinyin}</span>
                            <button class="play-theory-audio" onclick="playTextAudio('${d.chinese}')">🔊</button>
                        </div>
                    `).join('')}
                </div>
            </div>
            <div class="theory-section">
                <h4>🔢 Образование чисел (примеры)</h4>
                <div class="vocab-grid">
                    ${numbersData.examples.map(ex => `
                        <div class="vocab-item">
                            <span class="vocab-chinese">${ex.chinese}</span>
                            <span class="vocab-pinyin">${ex.pinyin}</span>
                            <span class="vocab-meaning">${ex.meaning}</span>
                            <button class="play-theory-audio" onclick="playTextAudio('${ex.chinese}')">🔊</button>
                        </div>
                    `).join('')}
                </div>
            </div>
            <div class="theory-section">
                <h4>📖 Примеры предложений с числами</h4>
                ${numbersData.sentences.map(s => `
                    <div class="example-sentence">
                        <div class="example-chinese">${s.chinese}</div>
                        <div class="example-pinyin">${s.pinyin}</div>
                        <div class="example-translation">${s.translation}</div>
                        <button class="play-theory-audio" onclick="playTextAudio('${s.chinese}')">🔊 Озвучить</button>
                    </div>
                `).join('')}
            </div>
        `;
    }

    function playTextAudio(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.7;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
        toast(`🔊 Озвучивание: ${text}`);
    }

    function selectOption(questionIdx, optionIdx) {
        if(!selectedLesson || !selectedLesson.quizzes) return;
        currentAnswers[questionIdx] = optionIdx;
        document.querySelectorAll(`.quiz-question[data-qid="${questionIdx}"] .option`).forEach(opt => {
            opt.classList.remove('selected');
            if(parseInt(opt.getAttribute('data-opt')) === optionIdx) opt.classList.add('selected');
        });
    }

    function checkAnswers() {
        if(!selectedLesson || !selectedLesson.quizzes) return toast('Нет тестов для проверки');
        let correctCount = 0;
        selectedLesson.quizzes.forEach((q, idx) => {
            const userAnswer = currentAnswers[idx];
            const isCorrect = userAnswer === q.correct;
            if(isCorrect) correctCount++;
            const options = document.querySelectorAll(`.quiz-question[data-qid="${idx}"] .option`);
            options.forEach((opt, optIdx) => {
                opt.classList.remove('correct', 'wrong', 'selected');
                if(optIdx === q.correct) opt.classList.add('correct');
                if(optIdx === userAnswer && userAnswer !== q.correct) opt.classList.add('wrong');
            });
        });
        const total = selectedLesson.quizzes.length;
        const percentage = (correctCount / total) * 100;
        const resultDiv = document.getElementById('quizResult');
        const completeBtn = document.getElementById('completeLessonBtn');
        if(percentage >= 70) {
            resultDiv.innerHTML = `<p style="color:#2ecc71;">✅ Результат: ${correctCount}/${total} (${Math.round(percentage)}%)</p><p>Отлично! Вы готовы к следующему уроку!</p>`;
            if(completeBtn) completeBtn.style.display = 'inline-block';
        } else {
            resultDiv.innerHTML = `<p style="color:#e74c3c;">❌ Результат: ${correctCount}/${total} (${Math.round(percentage)}%)</p><p>Попробуйте ещё раз! Нужно набрать 70% для завершения урока.</p>`;
            if(completeBtn) completeBtn.style.display = 'none';
        }
    }

    function completeLesson() {
        if(!selectedLesson) return;
        userProgress[`lesson_${selectedLesson.id}`] = { completed: true, completedAt: new Date().toISOString() };
        saveProgress();
        toast(`🎉 Поздравляем! Урок ${selectedLesson.level} пройден!`);
        renderStones();
        document.getElementById('lessonDetail').style.display = 'none';
    }

    function renderStories() {
        const container = document.getElementById('storiesContainer');
        if (!container) return;
        container.innerHTML = `<div class="stories-header"><h2>📖 Китайские народные сказки и легенды (10 историй)</h2></div><div class="story-cards" id="storyCards"></div>`;
        const cardsContainer = document.getElementById('storyCards');
        storiesData.forEach((story, idx) => {
            const card = document.createElement('div');
            card.className = 'story-card';
            card.innerHTML = `
                <div class="story-title" onclick="toggleStory(${idx})">
                    <h3>${story.title} · ${story.titleCn}</h3>
                    <div class="story-controls">
                        <button class="play-audio-btn" onclick="event.stopPropagation(); playStoryAudio(${idx})">🔊 Аудио</button>
                        <button class="toggle-story-btn" id="toggleBtn${idx}">▼</button>
                    </div>
                </div>
                <div class="story-content" id="storyContent${idx}">
                    <div class="chinese-text">${story.fullText}</div>
                    <div class="pinyin-text">${story.fullTextCn}</div>
                    <div class="russian-text">${story.fullStory}</div>
                    <div class="test-reading">
                        <p>📝 <strong>Проверка прочтения:</strong> Прочитайте текст вслух</p>
                        <button class="test-reading-btn" onclick="testReading(${idx})">🎙️ Начать чтение</button>
                        <p style="margin-top:10px; font-size:12px;" id="readingResult${idx}"></p>
                    </div>
                </div>
            `;
            cardsContainer.appendChild(card);
        });
    }

    function toggleStory(idx) {
        const content = document.getElementById(`storyContent${idx}`);
        const btn = document.getElementById(`toggleBtn${idx}`);
        if (content.classList.contains('active')) {
            content.classList.remove('active');
            btn.innerHTML = '▼';
        } else {
            content.classList.add('active');
            btn.innerHTML = '▲';
        }
    }

    function playStoryAudio(idx) {
        const story = storiesData[idx];
        if (activeStoryAudio) window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(story.fullText);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.7;
        window.speechSynthesis.speak(utterance);
        activeStoryAudio = utterance;
        toast(`🔊 ${story.title}`);
    }

    function testReading(idx) {
        const resultDiv = document.getElementById(`readingResult${idx}`);
        resultDiv.innerHTML = '🎙️ Слушаю...';
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'zh-CN';
            recognition.onresult = (event) => {
                resultDiv.innerHTML = `📝 Распознано: "${event.results[0][0].transcript}"<br>✅ Отличная попытка!`;
            };
            recognition.onerror = () => resultDiv.innerHTML = '❌ Попробуйте ещё раз';
            recognition.start();
        } else resultDiv.innerHTML = '⚠️ Не поддерживается';
    }

    // --- АВТОРИЗАЦИЯ (слайдер) ---
    const container = document.getElementById('container');
    const registerBtn = document.getElementById('register');
    const loginBtn = document.getElementById('login');
    
    if (registerBtn) registerBtn.addEventListener('click', () => container.classList.add('active'));
    if (loginBtn) loginBtn.addEventListener('click', () => container.classList.remove('active'));

    function handleLogin() {
        let val = document.getElementById('loginUsername').value.trim();
        let pwd = document.getElementById('loginPassword').value;
        let user = users.find(u => (u.email === val || u.username === val) && u.password === pwd);
        if (user) {
            currentUser = user;
            document.querySelector('.auth-wrapper').style.display = 'none';
            document.getElementById('mainApp').classList.add('visible');
            document.getElementById('userNameDisplay').innerText = user.username;
            updateHeaderAvatar();
            renderStones();
            renderNumbers();
            renderStories();
            toast(`Добро пожаловать, ${user.username} 🐉`);
        } else toast('Неверный логин или пароль');
    }

    function handleRegister() {
        let name = document.getElementById('regName').value.trim();
        let email = document.getElementById('regEmail').value.trim();
        let pwd = document.getElementById('regPwd').value;
        let conf = document.getElementById('regConfirm').value;
        if (!name || !email || !pwd) return toast('Заполните все поля');
        if (pwd !== conf) return toast('Пароли не совпадают');
        if (pwd.length < 6) return toast('Пароль ≥6 символов');
        if (users.find(u => u.email === email || u.username === name)) return toast('Пользователь существует');
        users.push({ id: users.length + 1, username: name, email: email, password: pwd, avatar: '' });
        saveUsers();
        toast('Регистрация успешна! Войдите.');
        container.classList.remove('active');
    }

    function forgotPasswordFlow() {
        let email = prompt('Введите ваш email:');
        if (!email) return;
        let user = users.find(u => u.email === email);
        if (!user) return toast('Email не найден');
        let newPass = prompt('Новый пароль (мин. 6 символов):');
        if (!newPass || newPass.length < 6) return toast('Слишком короткий');
        user.password = newPass;
        if (currentUser && currentUser.id === user.id) currentUser.password = newPass;
        saveUsers();
        toast('Пароль изменён!');
        if (currentUser) logout();
    }

    function openProfileModal() {
        if (!currentUser) return;
        let modal = document.getElementById('globalModal');
        let currentAvatar = currentUser.avatar || '';
        document.getElementById('modalContentInner').innerHTML = `
            <h3>🐉 ${currentUser.username}</h3>
            <p>${currentUser.email}</p>
            <img src="${currentAvatar}" id="previewAvatar" style="width:80px; border-radius:50%; margin-bottom:12px; border:2px solid #40e0d0;">
            <label style="display:block; background:#40e0d0; padding:6px; border-radius:30px; cursor:pointer;">📸 Загрузить фото
                <input type="file" id="avatarUpload" accept="image/*" style="display:none;">
            </label>
            <input type="password" id="oldPwdModal" placeholder="Старый пароль">
            <input type="password" id="newPwdModal" placeholder="Новый пароль">
            <input type="password" id="newPwd2Modal" placeholder="Повторите">
            <button onclick="changePasswordFromModal()">Сменить пароль</button>
            <button onclick="closeModal()">Закрыть</button>
        `;
        modal.classList.add('active');
        document.getElementById('avatarUpload').onchange = (e) => {
            let file = e.target.files[0];
            if (!file) return;
            let reader = new FileReader();
            reader.onload = (ev) => {
                currentUser.avatar = ev.target.result;
                let idx = users.findIndex(u => u.id === currentUser.id);
                if (idx !== -1) users[idx].avatar = ev.target.result;
                saveUsers();
                document.getElementById('previewAvatar').src = ev.target.result;
                updateHeaderAvatar();
                toast('Фото обновлено!');
            };
            reader.readAsDataURL(file);
        };
    }

    function updateHeaderAvatar() {
        let headerImg = document.getElementById('headerAvatar');
        if (headerImg && currentUser) headerImg.src = currentUser.avatar || 'https://placehold.co/100x100/1a2a4a/40e0d0?text=🐉';
    }

    function changePasswordFromModal() {
        let old = document.getElementById('oldPwdModal')?.value;
        let new1 = document.getElementById('newPwdModal')?.value;
        let new2 = document.getElementById('newPwd2Modal')?.value;
        if (!old || !new1) return toast('Введите пароли');
        if (currentUser.password !== old) return toast('Старый пароль неверен');
        if (new1 !== new2) return toast('Новые пароли не совпадают');
        if (new1.length < 6) return toast('Пароль ≥6 символов');
        currentUser.password = new1;
        let idx = users.findIndex(u => u.id === currentUser.id);
        if (idx !== -1) users[idx].password = new1;
        saveUsers();
        toast('Пароль обновлён');
        closeModal();
    }

    function logout() {
        if (activeStoryAudio) window.speechSynthesis.cancel();
        currentUser = null;
        document.getElementById('mainApp').classList.remove('visible');
        document.querySelector('.auth-wrapper').style.display = 'flex';
    }

    function closeModal() { document.getElementById('globalModal').classList.remove('active'); }
    function toast(msg) { let t = document.createElement('div'); t.className = 'toast'; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }

    document.querySelectorAll('.content-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.content-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.content-tab-pane').forEach(pane => pane.classList.remove('active'));
            document.getElementById(tab.getAttribute('data-tab')).classList.add('active');
        });
    });
    document.getElementById('forgotBtn')?.addEventListener('click', (e) => { e.preventDefault(); forgotPasswordFlow(); });

    // Фоновые анимации
    for (let i = 0; i < 25; i++) {
        let spark = document.createElement('div');
        spark.className = 'falling-spark';
        spark.innerHTML = ['✨','🔥','🐉','⚡','💫','🌟','🍃'][Math.floor(Math.random() * 7)];
        spark.style.left = Math.random() * 100 + '%';
        spark.style.animationDuration = 8 + Math.random() * 14 + 's';
        spark.style.animationDelay = Math.random() * 15 + 's';
        document.getElementById('bgAnimation').appendChild(spark);
    }
    for (let i = 0; i < 5; i++) {
        let dragon = document.createElement('div');
        dragon.className = 'floating-dragon';
        dragon.innerHTML = '🐉';
        dragon.style.bottom = Math.random() * 80 + '%';
        dragon.style.left = Math.random() * 80 + '%';
        dragon.style.animationDuration = 18 + Math.random() * 15 + 's';
        document.getElementById('bgAnimation').appendChild(dragon);
    }

    // Глобальные функции для HTML-вызовов
    window.selectOption = selectOption;
    window.checkAnswers = checkAnswers;
    window.completeLesson = completeLesson;
    window.toggleStory = toggleStory;
    window.playStoryAudio = playStoryAudio;
    window.testReading = testReading;
    window.playTextAudio = playTextAudio;
    window.handleLogin = handleLogin;
    window.handleRegister = handleRegister;
    window.openProfileModal = openProfileModal;
    window.changePasswordFromModal = changePasswordFromModal;
    window.closeModal = closeModal;
    window.logout = logout;

    initDemo();
</script>
</body>
</html>
